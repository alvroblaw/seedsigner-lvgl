name: CI

on:
  push:
    branches:
      - main
      - 'fix/**'
      - 'feat/**'
      - 'chore/**'
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            libsdl2-dev \
            python3 \
            python3-pil

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DBUILD_TESTING=ON \
            -DBUILD_HOST_DESKTOP=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Unit and integration tests
        run: ctest --test-dir build --output-on-failure -R 'seedsigner_lvgl_tests|input_profile_tests|scenario_suite|profile_matrix'

      - name: Screenshot capture
        run: ./build/screenshot_tests

      - name: Screenshot diff
        run: python3 tools/screenshot_diff.py

      - name: Upload screenshot artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-artifacts
          path: |
            screenshots/
            screenshots_diff/
            screenshot_diff_report.json
            build/scenario_out/
            build/matrix_out/
          if-no-files-found: ignore
